<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Random Order</title>
</head>
<body>
  <h1>Presentation Order</h1>

  <button onclick="shuffleOrder()">Random</button>

  <ol id="result"></ol>

  <script>
    function getNamesFromURL() {
      const params = new URLSearchParams(window.location.search);
      const names = params.get("names");

      if (!names) {
        return ["A", "B", "C", "D"];
      }

      return names.split(/[,、]/).map(name => name.trim()).filter(name => name);
    }

    function shuffleOrder() {
      const members = getNamesFromURL();

      for (let i = members.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [members[i], members[j]] = [members[j], members[i]];
      }

      const result = document.getElementById("result");
      result.innerHTML = "";

      members.forEach(member => {
        const li = document.createElement("li");
        li.textContent = member;
        result.appendChild(li);
      });
    }

    document.addEventListener("DOMContentLoaded", shuffleOrder);
  </script>
</body>
</html>
